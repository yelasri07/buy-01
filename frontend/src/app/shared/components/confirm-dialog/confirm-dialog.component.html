<div class="p-6 flex flex-col gap-4">
    <h2 class="text-xl font-semibold">
        {{ data.title }}
    </h2>

    <p class="text-accent">
        {{ data.message }}
    </p>

    <div class="flex justify-end gap-3 mt-4">
        <button class="px-4 py-2 rounded bg-secondary cursor-pointer" [mat-dialog-close]="false">
            {{ data.cancelText }}
        </button>

        <button class="px-4 py-2 rounded bg-red-600 text-primary cursor-pointer" [mat-dialog-close]="true">
            {{ data.confirmText }}
        </button>
    </div>
</div>
